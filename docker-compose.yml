services:
  app:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://cfdi_vault:cfdi_vault@postgres:5432/cfdi_vault}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://cfdi_vault:cfdi_vault@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CFDI_STORAGE_ROOT: ${CFDI_STORAGE_ROOT:-/app/storage}
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    command: ["doctor"]

  worker:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://cfdi_vault:cfdi_vault@postgres:5432/cfdi_vault}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://cfdi_vault:cfdi_vault@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CFDI_STORAGE_ROOT: ${CFDI_STORAGE_ROOT:-/app/storage}
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    command: ["worker", "run", "--loop"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cfdi_vault}
      POSTGRES_USER: ${POSTGRES_USER:-cfdi_vault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cfdi_vault}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cfdi_vault} -d ${POSTGRES_DB:-cfdi_vault}"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: redgate/flyway:latest
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cfdi_vault}
      - -user=${POSTGRES_USER:-cfdi_vault}
      - -password=${POSTGRES_PASSWORD:-cfdi_vault}
      - -locations=filesystem:/flyway/sql
      - -cleanDisabled=true
      - migrate
    volumes:
      - ./db/migration:/flyway/sql:ro

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-cfdi_vault}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-cfdi_vault}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
